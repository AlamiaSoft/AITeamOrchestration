version: '3.8'

services:
  # ---------------------------------------------------------------------------------
  # 0. Code Fetcher (Init Container)
  #    Clones both your Orchestration repo AND your generic VPS-AI-Bridge repo 
  #    before starting the main services.
  # ---------------------------------------------------------------------------------
  git-sync:
    image: alpine/git:latest
    container_name: git-sync
    # Replace these URLs with your actual public/private GitHub repository URLs
    # Example: 
    # ORCHESTRATOR_REPO="https://github.com/AliRaza/AITeamOrchestration.git"
    # BRIDGE_REPO="https://github.com/AliRaza/VPS-AI-Bridge.git"
    command: >
      sh -c " # Fetch Orchestrator Code if [ -d /repo/orchestration/.git ]; then
        cd /repo/orchestration && git pull origin main;
      else
        git clone https://github.com/AlamiaSoft/AITeamOrchestration.git /repo/orchestration;
      fi

      # Fetch Bridge Code if [ -d /repo/bridge/.git ]; then
        cd /repo/bridge && git pull origin main;
      else
        git clone https://github.com/AlamiaSoft/VPS-AI-Bridge-Standalone.git /repo/bridge;
      fi "
    volumes:
      - repo-data:/repo

  # ---------------------------------------------------------------------------------
  # 1. Intelligence Provider: The Custom VPS-AI-Bridge
  #    This acts as a standalone service built from its own repository code.
  # ---------------------------------------------------------------------------------
  vps-ai-bridge:
    build:
      context: .
      dockerfile: ./bridge/Dockerfile
    container_name: vps-ai-bridge
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SAMBANOVA_API_KEY=${SAMBANOVA_API_KEY}
    volumes:
      - repo-data:/app_code
    # Run the server from the standalone bridge repository folder
    command: [ "sh", "-c", "cd /app_code/bridge && pip install -r requirements.txt && uvicorn server:app --host 0.0.0.0 --port 5000" ]
    depends_on:
      git-sync:
        condition: service_completed_successfully
    networks:
      - agent-net

  # ---------------------------------------------------------------------------------
  # 2. Orchestration Engine: MetaGPT Backend
  # ---------------------------------------------------------------------------------
  metagpt:
    image: metagpt/metagpt:latest
    container_name: metagpt-backend
    restart: unless-stopped
    volumes:
      - repo-data:/repo
      - metagpt-workspace:/app/workspace
    working_dir: /app
    # Copy the config from the orchestrator repo volume to where MetaGPT expects it
    command: >
      sh -c " cp /repo/orchestration/infrastructure/config2.yaml /app/config/config2.yaml && tail -f /dev/null "
    depends_on:
      git-sync:
        condition: service_completed_successfully
      vps-ai-bridge:
        condition: service_started
    networks:
      - agent-net

  # ---------------------------------------------------------------------------------
  # 3. User Interface: MetaGPT Community WebUI
  # ---------------------------------------------------------------------------------
  metagpt-webui:
    image: orirep/metagpt-webui:latest
    container_name: metagpt-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - METAGPT_HOST=http://metagpt-backend:8080
    volumes:
      - metagpt-workspace:/app/workspace
    depends_on:
      - metagpt
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge

volumes:
  repo-data:
  metagpt-workspace:
