version: '3.8'

services:
  # ---------------------------------------------------------------------------------
  # 0. Code Fetcher (Init Container)
  #    Clones or pulls the latest code from GitHub into a shared volume before 
  #    the main services start. 
  # ---------------------------------------------------------------------------------
  git-sync:
    image: alpine/git:latest
    container_name: git-sync
    # IMPORTANT: Replace YOUR_REPO_URL with your actual GitHub HTTPS URL 
    # Example: https://github.com/AliRaza/AITeamOrchestration.git
    command: >
      sh -c "
      if [ -d /repo/.git ]; then
        cd /repo && git pull origin main;
      else
        git clone YOUR_REPO_URL /repo;
      fi
      "
    volumes:
      - repo-data:/repo

  # ---------------------------------------------------------------------------------
  # 1. Intelligence Provider: The Custom VPS-AI-Bridge
  #    Translates OpenAI formatted requests from MetaGPT into routed API calls 
  #    to Groq, SambaNova, OpenRouter etc.
  # ---------------------------------------------------------------------------------
  vps-ai-bridge:
    # Instead of building from a local context, we build from the fetched repo volume
    build: 
      context: . 
      dockerfile: ./VPS-AI-Bridge/Dockerfile
    container_name: vps-ai-bridge
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Inject your real API keys here (ideally via Portainer Secrets or .env file)
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SAMBANOVA_API_KEY=${SAMBANOVA_API_KEY}
    volumes:
      # Mount the cloned code
      - repo-data:/app_code
    # The Dockerfile expects code in /app, but we'll override the command to run from the mount
    command: ["sh", "-c", "cd /app_code/VPS-AI-Bridge && pip install -r requirements.txt && uvicorn server:app --host 0.0.0.0 --port 5000"]
    depends_on:
      git-sync:
        condition: service_completed_successfully
    networks:
      - agent-net

  # ---------------------------------------------------------------------------------
  # 2. Orchestration Engine: MetaGPT Backend
  #    Runs the agents and connects to the vps-ai-bridge for intelligence.
  # ---------------------------------------------------------------------------------
  metagpt:
    image: metagpt/metagpt:latest
    container_name: metagpt-backend
    restart: unless-stopped
    volumes:
      # Mount configuration file directly from the cloned repo volume
      - repo-data:/repo
      # Use a dedicated volume for the generated code workspace
      - metagpt-workspace:/app/workspace
    working_dir: /app
    # Copy the config from the repo volume to where MetaGPT expects it, then stay alive
    command: >
      sh -c "
      cp /repo/infrastructure/config2.yaml /app/config/config2.yaml &&
      tail -f /dev/null
      "
    depends_on:
      git-sync:
        condition: service_completed_successfully
      vps-ai-bridge:
        condition: service_started
    networks:
      - agent-net

  # ---------------------------------------------------------------------------------
  # 3. User Interface: MetaGPT Community WebUI
  #    Provides a visual way to interact with the MetaGPT backend.
  # ---------------------------------------------------------------------------------
  metagpt-webui:
    image: orirep/metagpt-webui:latest # Community image
    container_name: metagpt-webui
    restart: unless-stopped
    ports:
      - "8080:8080" # Access UI at http://<VPS-IP>:8080
    environment:
      - METAGPT_HOST=http://metagpt-backend:8080 
    volumes:
      # Access the same outputs generated by the backend
      - metagpt-workspace:/app/workspace
    depends_on:
      - metagpt
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge

volumes:
  # Shared volume holding the cloned GitHub repository
  repo-data:
  # Shared volume for generated outputs
  metagpt-workspace:
