version: '3.8'

services:
  # ---------------------------------------------------------------------------------
  # 0. Code Fetcher (Init Container)
  #    Clones all three repositories (Orchestrator, Bridge, WebUI) to a shared volume.
  # ---------------------------------------------------------------------------------
  git-sync:
    image: debian:bullseye-slim
    container_name: git-sync
    command: >
      sh -c "
      apt-get update && apt-get install -y git ca-certificates &&
      rm -rf /repo/orchestration /repo/metagpt-webui-src /repo/bridge &&
      git clone https://github.com/AlamiaSoft/AITeamOrchestration.git /repo/orchestration &&
      git clone https://github.com/Ori-Replication/MetaGPT-WebUI.git /repo/metagpt-webui-src &&
      git clone https://github.com/AlamiaSoft/VPS-AI-Bridge-Standalone.git /repo/bridge
      "
    volumes:
      - repo-data:/repo

  # ---------------------------------------------------------------------------------
  # 1. Intelligence Provider: The Custom VPS-AI-Bridge
  #    Uses standard Python slim image to avoid Portainer build restrictions.
  # ---------------------------------------------------------------------------------
  vps-ai-bridge:
    image: python:3.9-slim
    container_name: vps-ai-bridge
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SAMBANOVA_API_KEY=${SAMBANOVA_API_KEY}
    volumes:
      - repo-data:/repo
    command: >
      sh -c "
      cd /repo/bridge &&
      pip install --no-cache-dir -r requirements.txt &&
      uvicorn server:app --host 0.0.0.0 --port 5000
      "
    depends_on:
      git-sync:
        condition: service_completed_successfully
    networks:
      - agent-net

  # ---------------------------------------------------------------------------------
  # 2. Orchestration Engine: MetaGPT Backend
  # ---------------------------------------------------------------------------------
  metagpt:
    image: metagpt/metagpt:latest
    container_name: metagpt-backend
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=dummy-key-for-bridge
      - OPENAI_API_BASE=http://vps-ai-bridge:5000/v1
    volumes:
      - repo-data:/repo
      - metagpt-workspace:/app/workspace
    working_dir: /app
    command: >
      sh -c "
      tail -f /dev/null
      "
    depends_on:
      git-sync:
        condition: service_completed_successfully
      vps-ai-bridge:
        condition: service_started
    networks:
      - agent-net

  # ---------------------------------------------------------------------------------
  # 3. User Interface: MetaGPT Community WebUI
  #    Uses official MetaGPT image as base and installs Gradio at runtime.
  #    This completely bypasses Portainer's remote Dockerfile build failures!
  # ---------------------------------------------------------------------------------
  metagpt-webui:
    image: metagpt/metagpt:latest
    container_name: metagpt-webui
    restart: unless-stopped
    ports:
      - "9482:8080"
    environment:
      - METAGPT_HOST=http://metagpt-backend:8080
      - OPENAI_API_KEY=dummy-key-for-bridge
      - OPENAI_API_BASE=http://vps-ai-bridge:5000/v1
    volumes:
      - repo-data:/repo
      - metagpt-workspace:/app/workspace
    command: >
      sh -c "
      pip install --no-cache-dir gradio==2.3.6 &&
      cd /repo/metagpt-webui-src &&
      sed -i 's/app.queue.*launch(inbrowser=True)/app.queue().launch(server_name=\"0.0.0.0\", server_port=8080)/' metagpt/app.py &&
      PYTHONPATH=/repo/metagpt-webui-src python metagpt/app.py
      "
    depends_on:
      git-sync:
        condition: service_completed_successfully
      metagpt:
        condition: service_started
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge

volumes:
  repo-data:
  metagpt-workspace:
