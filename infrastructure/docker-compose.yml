version: '3.8'

services:
  # ---------------------------------------------------------------------------------
  # 0. Code Fetcher (Init Container)
  #    Clones the Orchestration deployment repository before other containers start
  #    so MetaGPT has access to its configuration files.
  # ---------------------------------------------------------------------------------
  git-sync:
    image: alpine/git:latest
    container_name: git-sync
    command: >
      sh -c "
      # Fetch Orchestrator Code (which includes our lightweight Dockerfile)
      if [ -d /repo/orchestration/.git ]; then
        cd /repo/orchestration && git pull origin main;
      else
        git clone https://github.com/AlamiaSoft/AITeamOrchestration.git /repo/orchestration;
      fi
      
      # Fetch the MetaGPT-WebUI source code directly
      if [ -d /repo/metagpt-webui-src/.git ]; then
        cd /repo/metagpt-webui-src && git pull origin main;
      else
        git clone https://github.com/Ori-Replication/MetaGPT-WebUI.git /repo/metagpt-webui-src;
      fi
      "
    volumes:
      - repo-data:/repo

  # ---------------------------------------------------------------------------------
  # 1. Intelligence Provider: The Custom VPS-AI-Bridge
  #    Portainer natively builds this by cloning the repository from GitHub.
  # ---------------------------------------------------------------------------------
  vps-ai-bridge:
    build: https://github.com/AlamiaSoft/VPS-AI-Bridge-Standalone.git#main
    container_name: vps-ai-bridge
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SAMBANOVA_API_KEY=${SAMBANOVA_API_KEY}
    networks:
      - agent-net

  # ---------------------------------------------------------------------------------
  # 2. Orchestration Engine: MetaGPT Backend
  # ---------------------------------------------------------------------------------
  metagpt:
    image: metagpt/metagpt:latest
    container_name: metagpt-backend
    restart: unless-stopped
    volumes:
      - repo-data:/repo
      - metagpt-workspace:/app/workspace
    working_dir: /app
    # Copy the config from the orchestrator repo volume to where MetaGPT expects it
    command: >
      sh -c "
      cp /repo/orchestration/infrastructure/config2.yaml /app/config/config2.yaml &&
      tail -f /dev/null
      "
    depends_on:
      git-sync:
        condition: service_completed_successfully
      vps-ai-bridge:
        condition: service_started
    networks:
      - agent-net

  # ---------------------------------------------------------------------------------
  # 3. User Interface: MetaGPT Community WebUI (Custom Lightweight Build)
  #    Builds from the fetched source code using our custom minimal Dockerfile 
  #    to avoid hundreds of MBs of Chromium and ARM package errors.
  # ---------------------------------------------------------------------------------
  metagpt-webui:
    # Instead of building from pulling the whole remote git repository using the 
    # author's heavy Dockerfile, we build using our local context.
    build: 
      context: .
      dockerfile: ./Dockerfile.webui
    container_name: metagpt-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - METAGPT_HOST=http://metagpt-backend:8080
    volumes:
      - repo-data:/repo
      - metagpt-workspace:/app/workspace
    # The container builds quickly because it just has Python.
    # At runtime, it navigates to the cloned UI source code, installs dependencies, 
    # patches Gradio to 0.0.0.0, and starts the interface.
    command: >
      sh -c "
      cd /repo/metagpt-webui-src &&
      pip install --no-cache-dir -r requirements.txt &&
      sed -i 's/app.queue.*launch(inbrowser=True)/app.queue().launch(server_name=\"0.0.0.0\", server_port=8080)/' metagpt/app.py &&
      python metagpt/app.py
      "
    depends_on:
      git-sync:
        condition: service_completed_successfully
      metagpt:
        condition: service_started
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge

volumes:
  repo-data:
  metagpt-workspace:
